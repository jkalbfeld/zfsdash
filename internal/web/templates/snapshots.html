{{template "base.html" .}}
{{define "title"}} — Snapshots{{end}}
{{define "content"}}
<div class="page-header">
  <h1>Snapshots</h1>
  <span class="updated">{{.SnapshotCount}} total — {{if not .CollectedAt.IsZero}}{{timeAgo .CollectedAt}}{{end}}</span>
</div>
<div id="snaps-table" hx-get="/htmx/snapshots" hx-trigger="every 60s" hx-swap="innerHTML">
  {{template "partial_snapshots.html" .}}
</div>
{{end}}
