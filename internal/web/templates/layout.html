<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zfsdash</title>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --border: #2a2d3a;
  --text: #e2e8f0;
  --muted: #718096;
  --ok: #48bb78;
  --warn: #ecc94b;
  --err: #fc8181;
  --blue: #63b3ed;
  --radius: 6px;
  --font: 'SF Mono', 'Fira Mono', 'Consolas', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }
a { color: var(--blue); text-decoration: none; }
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.05em; color: var(--text); }
header .tag { font-size: 11px; background: var(--border); color: var(--muted); padding: 2px 8px; border-radius: 999px; font-family: var(--font); }
.timestamp { margin-left: auto; font-size: 12px; color: var(--muted); font-family: var(--font); }
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }
.section { margin-bottom: 32px; }
.section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.card + .card { margin-top: 12px; }
.pool-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.pool-name { font-size: 15px; font-weight: 600; font-family: var(--font); }
.badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; }
.status-ok { background: rgba(72,187,120,0.15); color: var(--ok); }
.status-warn { background: rgba(236,201,75,0.15); color: var(--warn); }
.status-err { background: rgba(252,129,129,0.15); color: var(--err); }
.status-unknown { background: var(--border); color: var(--muted); }
.meta-row { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 12px; }
.meta-item { display: flex; flex-direction: column; gap: 2px; }
.meta-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.meta-value { font-size: 14px; font-weight: 500; font-family: var(--font); }
.progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 8px; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.pct-ok .progress-fill { background: var(--ok); }
.pct-warn .progress-fill { background: var(--warn); }
.pct-critical .progress-fill { background: var(--err); }
.pct-label { font-size: 12px; font-family: var(--font); color: var(--muted); margin-top: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 500; padding: 8px 12px; border-bottom: 1px solid var(--border); }
td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-family: var(--font); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.mono { font-family: var(--font); }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.tab-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: var(--radius); cursor: pointer; font-size: 13px; transition: all 0.15s; }
.tab-btn:hover { border-color: var(--blue); color: var(--blue); }
.tab-btn.active { background: var(--blue); border-color: var(--blue); color: var(--bg); font-weight: 600; }
.error-box { background: rgba(252,129,129,0.1); border: 1px solid var(--err); color: var(--err); padding: 12px 16px; border-radius: var(--radius); margin-bottom: 24px; font-family: var(--font); font-size: 13px; }
.vdev-tree { font-family: var(--font); font-size: 12px; }
.vdev-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; color: var(--muted); }
.vdev-name { flex: 1; }
.vdev-errs { font-size: 11px; }
.scrub-row { display: flex; gap: 16px; flex-wrap: wrap; padding-top: 8px; border-top: 1px solid var(--border); margin-top: 8px; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.stat-card .stat-value { font-size: 22px; font-weight: 700; font-family: var(--font); margin-bottom: 4px; }
.stat-card .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
@media(max-width:600px){ .meta-row { gap: 12px; } .stat-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<header>
  <h1>⬡ zfsdash</h1>
  <span class="tag">v0.1</span>
  {{if .CollectedAt.IsZero}}
  <span class="timestamp">not yet collected</span>
  {{else}}
  <span class="timestamp" title="{{.CollectedAt}}">updated {{timeAgo .CollectedAt}}</span>
  {{end}}
</header>
<div class="container">
  {{if .Error}}<div class="error-box">⚠ {{.Error}}</div>{{end}}

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('overview', this)">Overview</button>
    <button class="tab-btn" onclick="showTab('datasets', this)">Datasets</button>
    <button class="tab-btn" onclick="showTab('snapshots', this)">Snapshots</button>
  </div>

  <div id="tab-overview"
       hx-get="/partials/overview"
       hx-trigger="load, every {{.PollInterval}}s"
       hx-swap="innerHTML">
    {{template "overview.html" .}}
  </div>
  <div id="tab-datasets" style="display:none"
       hx-get="/partials/datasets"
       hx-trigger="revealed"
       hx-swap="innerHTML">
    {{template "datasets.html" .}}
  </div>
  <div id="tab-snapshots" style="display:none"
       hx-get="/partials/snapshots"
       hx-trigger="revealed"
       hx-swap="innerHTML">
    {{template "snapshots.html" .}}
  </div>
</div>
<script>
function showTab(name, btn) {
  ['overview','datasets','snapshots'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === name ? '' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // trigger htmx if not yet loaded
  const el = document.getElementById('tab-'+name);
  if (el.getAttribute('hx-trigger') === 'revealed') {
    el.setAttribute('hx-trigger', 'load');
    htmx.process(el);
  }
}
</script>
</body>
</html>
